name: tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        # --legacy-peer-deps: this repo pins @typescript-eslint/eslint-plugin@^8.26.1 whose conservative peer
        # range conflicts with the typescript@^6 devDep (newer 8.x in the sibling repos allow it). The conflict
        # is cosmetic for our tsc-compile + c8 test, so bypass the strict peer resolution.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      # The repo is ~95% generated gRPC/protobuf stubs; coverage is gated on the HAND-WRITTEN surface
      # (the D18 Keycloak offline-token auth provider). The test compiles the TS provider + spec and runs
      # node's built-in test runner under c8 with a >=90% line-coverage gate.
      - name: Unit tests + >=90% coverage gate on hand-written code
        run: npm test
